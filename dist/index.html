<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Snake</h1>
    <p class="subtitle">Arrow keys or WASD. Press space to restart.</p>
    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>
    <canvas id="game" width="400" height="400" aria-label="Snake game"></canvas>
    <p id="status" class="status">Press any arrow key to start.</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
